<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Film strip accent -->
  <rect x="64" y="64" width="48" height="384" rx="16" fill="#1e293b" />
  <!-- Film holes -->
  <rect x="76" y="84" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="138" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="192" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="246" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="300" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="354" width="24" height="24" rx="6" fill="#020617" />
  <rect x="76" y="408" width="24" height="24" rx="6" fill="#020617" />

  <!-- Play Button Base / Glow -->
  <path d="M190 160 L380 256 L190 352 Z" fill="url(#brand)" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Play Button -->
  <path d="M190 160 L380 256 L190 352 Z" fill="url(#brand)" stroke="white" stroke-width="12" stroke-linejoin="round"/>
</svg>